apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: system:cloud-controller-manager
rules:
  # Node lifecycle and labels
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
      - patch
      - update

  # Node status (addresses and conditions)
  - apiGroups:
      - ""
    resources:
      - nodes/status
    verbs:
      - patch

  # Recording events
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch

  # Leader election
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - create
      - update

  # Service account token creation
  - apiGroups:
      - ""
    resources:
      - serviceaccounts
    verbs:
      - get

  # Cloud config
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
